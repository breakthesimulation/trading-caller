name: Deploy Stage to Vercel

on:
  push:
    branches: [stage]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    name: Deploy Preview
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
      - name: Alias to stable staging URL
        run: vercel alias set ${{ steps.deploy.outputs.url }} stage-trading-caller.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
      - name: Summary
        run: |
          echo "### Staging Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Preview**: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stable**: https://stage-trading-caller.vercel.app" >> $GITHUB_STEP_SUMMARY
